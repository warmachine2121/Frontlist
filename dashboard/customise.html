<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Customise — Frontlist</title>
  <link rel="icon" href="/branding/frontlist-logo.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#09090B; --surface:#18181B; --border:#27272A; --text:#FAFAFA; --muted:#A1A1AA; --accent:#6366F1; --accent-h:#4F46E5; }
    body { font-family: system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    a { color:inherit; text-decoration:none; }

    nav { display:flex; align-items:center; gap:2rem; padding:1rem 2rem; border-bottom:1px solid var(--border); background:var(--surface); position:sticky; top:0; z-index:10; }
    .nav-links { display:flex; gap:1.5rem; }
    .nav-links a { font-size:.875rem; color:var(--muted); transition:color .15s; }
    .nav-links a:hover, .nav-links a.active { color:var(--text); }

    .layout { display:grid; grid-template-columns:1fr 1fr; gap:2rem; max-width:1100px; margin:0 auto; padding:2.5rem 2rem; }
    @media(max-width:768px){ .layout{ grid-template-columns:1fr; } }

    h1 { font-size:1.5rem; font-weight:700; letter-spacing:-.02em; margin-bottom:1.75rem; }

    .section { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1.5rem; margin-bottom:1.25rem; }
    .section-title { font-size:.75rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:1rem; }

    .field { margin-bottom:1rem; }
    .field:last-child { margin-bottom:0; }
    .field label { display:block; font-size:.8rem; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-bottom:.4rem; }
    .field input[type=text] {
      width:100%; padding:.65rem .9rem; background:var(--bg); border:1px solid var(--border);
      border-radius:8px; color:var(--text); font-size:.9rem; outline:none; transition:border-color .15s;
    }
    .field input[type=text]:focus { border-color:var(--accent); }
    .field input[type=text]::placeholder { color:#52525B; }

    /* Colour picker row */
    .colour-row { display:flex; align-items:center; gap:.75rem; }
    .colour-swatch {
      width:40px; height:40px; border-radius:8px; border:2px solid var(--border);
      cursor:pointer; flex-shrink:0; position:relative; overflow:hidden;
    }
    .colour-swatch input[type=color] {
      position:absolute; inset:-4px; width:calc(100%+8px); height:calc(100%+8px);
      opacity:0; cursor:pointer; border:none; padding:0;
    }
    .colour-hex {
      flex:1; padding:.65rem .9rem; background:var(--bg); border:1px solid var(--border);
      border-radius:8px; color:var(--text); font-size:.9rem; outline:none;
      transition:border-color .15s; font-family:monospace;
    }
    .colour-hex:focus { border-color:var(--accent); }

    /* Logo upload */
    .logo-upload-area {
      border:2px dashed var(--border); border-radius:8px; padding:1.25rem;
      text-align:center; cursor:pointer; transition:border-color .15s;
    }
    .logo-upload-area:hover { border-color:var(--accent); }
    .logo-upload-area input { display:none; }
    .logo-upload-text { font-size:.875rem; color:var(--muted); }
    .logo-preview-img { max-height:48px; margin:0 auto .5rem; display:none; }
    .upload-btn {
      margin-top:.75rem; padding:.5rem 1rem; background:var(--accent); color:#fff;
      border:none; border-radius:6px; font-size:.8rem; font-weight:600; cursor:pointer;
      transition:opacity .15s;
    }
    .upload-btn:hover { opacity:.85; }
    .upload-msg { font-size:.8rem; color:var(--muted); margin-top:.5rem; }

    /* Slug field */
    .slug-prefix { font-size:.85rem; color:var(--muted); margin-bottom:.35rem; }
    #slug-msg { font-size:.8rem; margin-top:.35rem; }

    .save-btn {
      width:100%; padding:.75rem; background:var(--accent); color:#fff; border:none;
      border-radius:8px; font-size:.95rem; font-weight:600; cursor:pointer;
      transition:background .15s, opacity .15s; margin-top:.25rem;
    }
    .save-btn:hover { background:var(--accent-h); }
    .save-btn:disabled { opacity:.6; cursor:default; }
    .save-msg { font-size:.875rem; text-align:center; margin-top:.75rem; min-height:1.2em; }
    .save-msg.ok  { color:#86EFAC; }
    .save-msg.err { color:#FCA5A5; }

    /* Colour presets */
    .presets { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1rem; }
    .preset {
      display:flex; align-items:center; gap:.4rem; padding:.35rem .7rem;
      border-radius:6px; border:1.5px solid var(--border); cursor:pointer;
      font-size:.78rem; font-weight:500; color:var(--muted); transition:border-color .15s, color .15s;
      background:transparent;
    }
    .preset:hover { border-color:var(--accent); color:var(--text); }
    .preset-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

    /* Live preview */
    .preview-label { font-size:.75rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:.75rem; }

    /* Browser mockup */
    .browser {
      border-radius:10px; overflow:hidden; border:1px solid var(--border);
      background:var(--surface);
    }
    .browser-bar {
      display:flex; align-items:center; gap:.6rem; padding:.6rem 1rem;
      border-bottom:1px solid var(--border); background:var(--surface);
    }
    .browser-dots { display:flex; gap:.35rem; }
    .browser-dot { width:10px; height:10px; border-radius:50%; }
    .browser-url {
      flex:1; background:var(--bg); border:1px solid var(--border); border-radius:5px;
      padding:.25rem .65rem; font-size:.75rem; color:var(--muted); font-family:monospace;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .preview-inner {
      background:#f5f5f5; padding:2.5rem 1.5rem;
      text-align:center; min-height:300px; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:.75rem;
    }
    .prev-logo { max-height:48px; max-width:160px; display:none; }
    .prev-title { font-size:1.5rem; font-weight:700; letter-spacing:-.02em; }
    .prev-desc { font-size:.9rem; opacity:.7; max-width:320px; }
    .prev-input {
      width:100%; max-width:320px; padding:.6rem .9rem; border-radius:7px;
      border:1.5px solid #ddd; font-size:.9rem; background:#fff; outline:none;
    }
    .prev-btn {
      padding:.6rem 1.25rem; border:none; border-radius:7px;
      font-size:.9rem; font-weight:600; cursor:pointer; color:#fff;
    }
    .prev-powered { font-size:.75rem; opacity:.4; margin-top:.5rem; }
  </style>
</head>
<body>

<nav>
  <a href="/"><img src="/branding/frontlist-logo.svg" alt="Frontlist" height="28" style="display:block"></a>
  <div class="nav-links">
    <a href="index.html">Overview</a>
    <a href="customise.html" class="active">Customise</a>
    <a href="signups.html">Signups</a>
    <a href="notifications.html">Notifications</a>
    <a href="billing.html">Billing</a>
  </div>
</nav>

<div class="layout" id="layout">
  <div id="form-col">
    <h1>Customise your page</h1>
    <p style="color:var(--muted);font-size:.9rem">Loading…</p>
  </div>
  <div id="preview-col">
    <div class="preview-label">Live preview</div>
    <div class="browser">
      <div class="browser-bar">
        <div class="browser-dots">
          <div class="browser-dot" style="background:#FF5F57"></div>
          <div class="browser-dot" style="background:#FFBD2E"></div>
          <div class="browser-dot" style="background:#28CA41"></div>
        </div>
        <div class="browser-url" id="browser-url">frontlist-zd5g.vercel.app/your-slug</div>
      </div>
      <div class="preview-inner" id="preview">
        <img id="prev-logo-img" class="prev-logo" src="" alt="logo">
        <div class="prev-title" id="prev-title">My Waitlist</div>
        <div class="prev-desc" id="prev-desc"></div>
        <input class="prev-input" placeholder="you@example.com" disabled>
        <button class="prev-btn" id="prev-btn">Join</button>
        <div class="prev-powered">Powered by Frontlist</div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
  await import('/supabase-config.js');
  const supabase = createClient(window.__SUPABASE_URL, window.__SUPABASE_ANON_KEY);

  const params    = new URLSearchParams(window.location.search);
  const founderId = params.get('founder_id');
  const formCol   = document.getElementById('form-col');

  if (!founderId) {
    formCol.innerHTML = '<p>No founder context. <a href="/login.html" style="color:#6366F1">Log in</a></p>';
    throw new Error('no founder_id');
  }

  // Preview elements
  const prevTitle = document.getElementById('prev-title');
  const prevDesc  = document.getElementById('prev-desc');
  const prevBtn   = document.getElementById('prev-btn');
  const preview   = document.getElementById('preview');

  function updatePreview(title, desc, primary, accent, logoUrl) {
    prevTitle.textContent      = title || 'My Waitlist';
    prevTitle.style.color      = primary || '#111';
    prevDesc.textContent       = desc || '';
    prevBtn.style.background   = primary || '#111';
    prevBtn.style.color        = accent  || '#fff';
    preview.style.background   = '#f5f5f5';
    const logo = document.getElementById('prev-logo-img');
    if (logo) { logo.src = logoUrl || ''; logo.style.display = logoUrl ? 'block' : 'none'; }
  }

  function hexFromPicker(val) {
    return val.startsWith('#') ? val : '#' + val;
  }

  async function load() {
    const res = await fetch(`/api/founder?id=${encodeURIComponent(founderId)}`);
    if (!res.ok) { formCol.innerHTML = '<p>Could not load projects.</p>'; return; }
    const j        = await res.json();
    const projects = j.projects || [];
    if (!projects.length) { formCol.innerHTML = '<p>No projects found.</p>'; return; }
    renderForm(projects[0]);
  }

  function renderForm(project) {
    const primaryVal = project.primary_color || '#111111';
    const accentVal  = project.accent_color  || '#ffffff';

    formCol.innerHTML = `
      <h1>Customise your page</h1>

      <div class="section">
        <div class="section-title">Page content</div>
        <div class="field">
          <label>Page title</label>
          <input type="text" id="f-title" value="${esc(project.title||'')}" placeholder="e.g. Join the waitlist">
        </div>
        <div class="field">
          <label>Description</label>
          <input type="text" id="f-desc" value="${esc(project.description||'')}" placeholder="A short line about your product">
        </div>
        <div class="field">
          <label>URL slug</label>
          <div class="slug-prefix">frontlist-zd5g.vercel.app/<strong id="slug-live">${esc(project.slug||'')}</strong></div>
          <input type="text" id="f-slug" value="${esc(project.slug||'')}" placeholder="your-brand">
          <div id="slug-msg"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Brand colours</div>
        <div class="presets" id="presets">
          <button class="preset" data-primary="#0F172A" data-accent="#F8FAFC" title="Midnight"><span class="preset-dot" style="background:#0F172A"></span>Midnight</button>
          <button class="preset" data-primary="#1E3A5F" data-accent="#E0F0FF" title="Ocean"><span class="preset-dot" style="background:#1E3A5F"></span>Ocean</button>
          <button class="preset" data-primary="#1B4332" data-accent="#D8F3DC" title="Forest"><span class="preset-dot" style="background:#1B4332"></span>Forest</button>
          <button class="preset" data-primary="#7C3AED" data-accent="#F5F3FF" title="Violet"><span class="preset-dot" style="background:#7C3AED"></span>Violet</button>
          <button class="preset" data-primary="#C2410C" data-accent="#FFF7ED" title="Sunset"><span class="preset-dot" style="background:#C2410C"></span>Sunset</button>
          <button class="preset" data-primary="#111111" data-accent="#FFFFFF" title="Monochrome"><span class="preset-dot" style="background:#111"></span>Mono</button>
        </div>
        <div class="field">
          <label>Primary colour <span style="font-size:.75rem;color:var(--muted);text-transform:none">(background & headings)</span></label>
          <div class="colour-row">
            <div class="colour-swatch" id="primary-swatch" style="background:${esc(primaryVal)}">
              <input type="color" id="primary-picker" value="${esc(primaryVal)}">
            </div>
            <input class="colour-hex" type="text" id="primary-hex" value="${esc(primaryVal)}" maxlength="7" placeholder="#000000">
          </div>
        </div>
        <div class="field">
          <label>Accent colour <span style="font-size:.75rem;color:var(--muted);text-transform:none">(button text)</span></label>
          <div class="colour-row">
            <div class="colour-swatch" id="accent-swatch" style="background:${esc(accentVal)}">
              <input type="color" id="accent-picker" value="${esc(accentVal)}">
            </div>
            <input class="colour-hex" type="text" id="accent-hex" value="${esc(accentVal)}" maxlength="7" placeholder="#ffffff">
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Logo</div>
        <div class="logo-upload-area" id="logo-area">
          <img id="prev-logo-img" class="prev-logo" src="${esc(project.logo_url||'')}" style="display:${project.logo_url?'block':'none'}">
          <div class="logo-upload-text" id="logo-upload-text">${project.logo_url ? 'Click to change logo' : 'Click to upload logo'}<br><span style="font-size:.75rem">PNG, JPG, SVG — max 2MB</span></div>
          <input type="file" id="logo-file" accept="image/*">
        </div>
        <button class="upload-btn" id="upload-btn" style="display:none">Upload logo</button>
        <div class="upload-msg" id="logo-msg"></div>
      </div>

      <button class="save-btn" id="save-btn">Save changes</button>
      <div class="save-msg" id="save-msg"></div>
    `;

    // Init preview
    updatePreview(project.title, project.description, primaryVal, accentVal, project.logo_url);

    // Live title/desc updates
    document.getElementById('f-title').addEventListener('input', e => {
      prevTitle.textContent = e.target.value || 'My Waitlist';
    });
    document.getElementById('f-desc').addEventListener('input', e => {
      prevDesc.textContent = e.target.value;
    });

    // Slug updates browser URL bar
    document.getElementById('f-slug').addEventListener('input', e => {
      document.getElementById('slug-live').textContent = e.target.value || '';
      document.getElementById('browser-url').textContent = `frontlist-zd5g.vercel.app/${e.target.value || 'your-slug'}`;
    });
    // Init browser URL
    document.getElementById('browser-url').textContent = `frontlist-zd5g.vercel.app/${project.slug || 'your-slug'}`;

    // Colour presets
    document.getElementById('presets').addEventListener('click', e => {
      const btn = e.target.closest('.preset');
      if (!btn) return;
      const primary = btn.dataset.primary;
      const accent  = btn.dataset.accent;
      // Update pickers + hex inputs + swatches
      document.getElementById('primary-picker').value   = primary;
      document.getElementById('primary-hex').value      = primary;
      document.getElementById('primary-swatch').style.background = primary;
      document.getElementById('accent-picker').value    = accent;
      document.getElementById('accent-hex').value       = accent;
      document.getElementById('accent-swatch').style.background  = accent;
      // Update preview
      prevTitle.style.color    = primary;
      prevBtn.style.background = primary;
      prevBtn.style.color      = accent;
    });

    // Colour pickers
    function bindColour(pickerId, hexId, swatchId, updateFn) {
      const picker = document.getElementById(pickerId);
      const hex    = document.getElementById(hexId);
      const swatch = document.getElementById(swatchId);

      picker.addEventListener('input', e => {
        hex.value = e.target.value;
        swatch.style.background = e.target.value;
        updateFn(e.target.value);
      });
      hex.addEventListener('input', e => {
        const val = e.target.value;
        if (/^#[0-9a-fA-F]{6}$/.test(val)) {
          picker.value = val;
          swatch.style.background = val;
          updateFn(val);
        }
      });
    }

    bindColour('primary-picker', 'primary-hex', 'primary-swatch', val => {
      prevTitle.style.color    = val;
      prevBtn.style.background = val;
    });
    bindColour('accent-picker', 'accent-hex', 'accent-swatch', val => {
      prevBtn.style.color = val;
    });

    // Slug live update + validation
    const slugInput = document.getElementById('f-slug');
    const slugMsg   = document.getElementById('slug-msg');
    const saveBtn   = document.getElementById('save-btn');
    let slugTimer   = null;

    slugInput.addEventListener('input', () => {
      const val = slugInput.value.trim().toLowerCase();
      slugInput.value = val;
      document.getElementById('slug-live').textContent = val;
      slugMsg.textContent = '';
      saveBtn.disabled = true;
      clearTimeout(slugTimer);
      slugTimer = setTimeout(async () => {
        if (!val) { saveBtn.disabled = false; return; }
        if (!/^[a-z0-9-]+$/.test(val)) {
          slugMsg.style.color = '#FCA5A5'; slugMsg.textContent = 'Only lowercase letters, numbers and hyphens'; return;
        }
        try {
          const r = await fetch(`/api/check-slug?slug=${encodeURIComponent(val)}&project_id=${encodeURIComponent(project.id)}`);
          const j = await r.json();
          if (j.available) {
            slugMsg.style.color = '#86EFAC'; slugMsg.textContent = '✓ Available';
            saveBtn.disabled = false;
          } else {
            slugMsg.style.color = '#FCA5A5'; slugMsg.textContent = 'Slug already taken';
          }
        } catch { slugMsg.style.color = '#FCA5A5'; slugMsg.textContent = 'Could not check slug'; }
      }, 500);
    });
    saveBtn.disabled = false;

    // Logo upload
    const logoArea  = document.getElementById('logo-area');
    const logoFile  = document.getElementById('logo-file');
    const uploadBtn = document.getElementById('upload-btn');
    const logoMsg   = document.getElementById('logo-msg');

    logoArea.addEventListener('click', () => logoFile.click());
    logoFile.addEventListener('change', () => {
      if (logoFile.files[0]) {
        document.getElementById('logo-upload-text').textContent = logoFile.files[0].name;
        uploadBtn.style.display = 'block';
      }
    });

    uploadBtn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const f = logoFile.files[0];
      if (!f) return;
      logoMsg.textContent = 'Uploading…';
      try {
        const ext  = f.name.split('.').pop();
        const path = `${project.id}/logo-${Date.now()}.${ext}`;
        const up   = await supabase.storage.from('logos').upload(path, f, { upsert: true });
        if (up.error) throw up.error;
        const pub       = supabase.storage.from('logos').getPublicUrl(path);
        const publicUrl = pub?.data?.publicUrl || '';
        if (!publicUrl) throw new Error('Could not get public URL');
        const s     = await supabase.auth.getSession();
        const token = s?.data?.session?.access_token;
        if (!token) throw new Error('Not logged in');
        const r = await fetch('/api/update-project', {
          method: 'POST',
          headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${token}` },
          body: JSON.stringify({ project_id: project.id, logo_url: publicUrl })
        });
        if (!r.ok) throw new Error('Could not save logo');
        logoMsg.style.color = '#86EFAC';
        logoMsg.textContent = '✓ Logo uploaded';
        const prevLogoImg = document.getElementById('prev-logo-img');
        prevLogoImg.src = publicUrl;
        prevLogoImg.style.display = 'block';
        uploadBtn.style.display = 'none';
      } catch(err) {
        logoMsg.style.color = '#FCA5A5';
        logoMsg.textContent = err.message || 'Upload failed';
      }
    });

    // Save
    document.getElementById('save-btn').addEventListener('click', async () => {
      const msg   = document.getElementById('save-msg');
      const btn   = document.getElementById('save-btn');
      btn.disabled = true;
      msg.textContent = '';
      try {
        const s     = await supabase.auth.getSession();
        const token = s?.data?.session?.access_token;
        if (!token) throw new Error('You must be logged in');
        const body = {
          project_id:    project.id,
          title:         document.getElementById('f-title').value.trim(),
          slug:          document.getElementById('f-slug').value.trim(),
          primary_color: document.getElementById('primary-hex').value.trim(),
          accent_color:  document.getElementById('accent-hex').value.trim(),
          description:   document.getElementById('f-desc').value.trim(),
        };
        const r = await fetch('/api/update-project', {
          method: 'POST',
          headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${token}` },
          body: JSON.stringify(body)
        });
        const j = await r.json();
        if (!r.ok) throw new Error(j?.error || 'Save failed');
        msg.className = 'save-msg ok';
        msg.textContent = '✓ Saved successfully';
        btn.disabled = false;
      } catch(err) {
        msg.className = 'save-msg err';
        msg.textContent = err.message || 'Save failed';
        btn.disabled = false;
      }
    });
  }

  function esc(s) {
    return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  load();
</script>

<script>
(function(){
  const id = new URLSearchParams(window.location.search).get("founder_id");
  if (!id) return;
  document.querySelectorAll(".nav-links a").forEach(a=>{
    const u = new URL(a.href, location.href);
    u.searchParams.set("founder_id", id);
    a.href = u.toString();
  });
})();
</script>

</body>
</html>
