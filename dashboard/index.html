<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard — Frontlist</title>
  <link rel="icon" href="/branding/frontlist-logo.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#09090B; --surface:#18181B; --border:#27272A; --text:#FAFAFA; --muted:#A1A1AA; --accent:#6366F1; }
    body { font-family: system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }
    a { color:inherit; text-decoration:none; }

    nav {
      display:flex; align-items:center; justify-content:space-between;
      padding:1rem 2rem; border-bottom:1px solid var(--border);
      background:var(--surface); position:sticky; top:0; z-index:10;
    }
    .nav-left { display:flex; align-items:center; gap:2rem; }
    .nav-links { display:flex; gap:1.5rem; }
    .nav-links a { font-size:.875rem; color:var(--muted); transition:color .15s; }
    .nav-links a:hover, .nav-links a.active { color:var(--text); }

    main { max-width:900px; width:100%; margin:0 auto; padding:2.5rem 2rem; }
    h1 { font-size:1.5rem; font-weight:700; letter-spacing:-.02em; margin-bottom:2rem; }

    .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:1rem; margin-bottom:2.5rem; }
    .stat { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1.25rem 1.5rem; }
    .stat-label { font-size:.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:.4rem; }
    .stat-value { font-size:1.75rem; font-weight:700; letter-spacing:-.02em; }

    .section { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1.5rem; margin-bottom:1.25rem; }
    .section h2 { font-size:1rem; font-weight:600; margin-bottom:1rem; }
    .info-row { display:flex; justify-content:space-between; align-items:center; padding:.6rem 0; border-bottom:1px solid var(--border); font-size:.9rem; }
    .info-row:last-child { border-bottom:none; }
    .info-row span { color:var(--muted); font-size:.85rem; }
    .badge { display:inline-block; padding:.2rem .65rem; border-radius:999px; font-size:.75rem; font-weight:600; }
    .badge-free { background:rgba(161,161,170,.15); color:var(--muted); }
    .badge-pro  { background:rgba(99,102,241,.15); color:#818CF8; }
    .project-link { color:var(--accent); font-size:.875rem; }
    .project-link:hover { text-decoration:underline; }
    #overview { color:var(--muted); font-size:.9rem; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <a href="/"><img src="/branding/frontlist-logo.svg" alt="Frontlist" height="28" style="display:block"></a>
      <div class="nav-links">
        <a href="index.html" class="active">Overview</a>
        <a href="customise.html">Customise</a>
        <a href="signups.html">Signups</a>
        <a href="notifications.html">Notifications</a>
        <a href="billing.html">Billing</a>
      </div>
    </div>
  </nav>

  <main>
    <h1>Overview</h1>
    <div id="overview">
      <p>Loading…</p>
    </div>
  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    await import('/supabase-config.js');
    const supabase = createClient(window.__SUPABASE_URL, window.__SUPABASE_ANON_KEY);

    (async function() {
      const params = new URLSearchParams(window.location.search);
      let founderId = params.get('founder_id');
      const el = document.getElementById('overview');

      if (!founderId) {
        try {
          const { data } = await supabase.auth.getSession();
          const session = data.session;
          if (session?.user?.email) {
            const res = await fetch(`/api/founder?email=${encodeURIComponent(session.user.email)}`);
            if (res.ok) {
              const j = await res.json();
              founderId = j.founder?.id;
              if (founderId) {
                const u = new URL(window.location.href);
                u.searchParams.set('founder_id', founderId);
                window.location.replace(u.toString());
                return;
              }
            }
          }
        } catch(e) { console.warn(e); }
        el.innerHTML = '<p>No session found. <a href="/login.html" style="color:#6366F1">Log in</a> to view your dashboard.</p>';
        return;
      }

      try {
        const res = await fetch(`/api/founder?id=${encodeURIComponent(founderId)}`);
        if (!res.ok) throw new Error('Could not fetch founder');
        const data = await res.json();
        const f = data.founder;
        const projects = data.projects || [];
        const planBadge = f.plan === 'pro' ? '<span class="badge badge-pro">Pro</span>' : '<span class="badge badge-free">Free</span>';
        el.innerHTML = `
          <div class="stats">
            <div class="stat"><div class="stat-label">Projects</div><div class="stat-value">${projects.length}</div></div>
            <div class="stat"><div class="stat-label">Plan</div><div class="stat-value" style="font-size:1.1rem;margin-top:.3rem">${planBadge}</div></div>
          </div>
          <div class="section">
            <h2>Account</h2>
            <div class="info-row">Email <span>${f.email}</span></div>
            <div class="info-row">Plan <span>${planBadge}</span></div>
            ${f.stripe_customer_id ? `<div class="info-row">Stripe customer <span>${f.stripe_customer_id}</span></div>` : ''}
          </div>
          ${projects.length > 0 ? `
          <div class="section">
            <h2>Your waitlist pages</h2>
            ${projects.map(p => `
              <div class="info-row">
                ${p.title || p.slug}
                <a class="project-link" href="/${p.slug}" target="_blank">/${p.slug} ↗</a>
              </div>`).join('')}
          </div>` : '<div class="section"><h2>No projects yet</h2><p style="color:var(--muted);font-size:.875rem">Go to <a href="customise.html" style="color:#6366F1">Customise</a> to set up your waitlist page.</p></div>'}
        `;
      } catch(err) {
        el.innerHTML = '<p>Error loading dashboard. Try again.</p>';
      }
    })();
  </script>
<script>
// Append founder_id to all nav links
(function(){
  const id = new URLSearchParams(window.location.search).get("founder_id");
  if (!id) return;
  document.querySelectorAll(".nav-links a").forEach(a=>{
    const u = new URL(a.href, location.href);
    u.searchParams.set("founder_id", id);
    a.href = u.toString();
  });
})(); // nav-founder-fix
</script>
</body>
</html>
