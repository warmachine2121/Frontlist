<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Billing — Frontlist</title>
  <link rel="icon" href="/branding/frontlist-logo.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#09090B; --surface:#18181B; --border:#27272A; --text:#FAFAFA; --muted:#A1A1AA; --accent:#6366F1; }
    body { font-family: system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    a { color:inherit; text-decoration:none; }
    nav { display:flex; align-items:center; gap:2rem; padding:1rem 2rem; border-bottom:1px solid var(--border); background:var(--surface); position:sticky; top:0; z-index:10; }
    .nav-links { display:flex; gap:1.5rem; }
    .nav-links a { font-size:.875rem; color:var(--muted); transition:color .15s; }
    .nav-links a:hover, .nav-links a.active { color:var(--text); }
    main { max-width:640px; margin:0 auto; padding:2.5rem 2rem; }
    h1 { font-size:1.5rem; font-weight:700; letter-spacing:-.02em; margin-bottom:2rem; }
    .section { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1.5rem; margin-bottom:1.25rem; }
    .section h2 { font-size:1rem; font-weight:600; margin-bottom:1rem; }
    .info-row { display:flex; justify-content:space-between; align-items:center; padding:.6rem 0; border-bottom:1px solid var(--border); font-size:.9rem; }
    .info-row:last-child { border-bottom:none; }
    .info-row span { color:var(--muted); font-size:.85rem; }
    .badge-pro { display:inline-block; padding:.2rem .65rem; border-radius:999px; font-size:.75rem; font-weight:600; background:rgba(99,102,241,.15); color:#818CF8; }
    .badge-free { display:inline-block; padding:.2rem .65rem; border-radius:999px; font-size:.75rem; font-weight:600; background:rgba(161,161,170,.15); color:var(--muted); }
    .btn { padding:.7rem 1.25rem; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:.9rem; font-weight:600; cursor:pointer; transition:opacity .15s; margin-top:1rem; display:inline-block; }
    .btn:hover { opacity:.85; }
    .upgrade-box { background:rgba(99,102,241,.06); border:1px solid rgba(99,102,241,.2); border-radius:10px; padding:1.5rem; }
    .upgrade-box h2 { font-size:1rem; font-weight:600; margin-bottom:.4rem; }
    .upgrade-box p { font-size:.875rem; color:var(--muted); margin-bottom:1rem; }
  </style>
</head>
<body>
  <nav>
    <a href="/"><img src="/branding/frontlist-logo.svg" alt="Frontlist" height="28" style="display:block"></a>
    <div class="nav-links">
      <a href="index.html">Overview</a>
      <a href="customise.html">Customise</a>
      <a href="signups.html">Signups</a>
      <a href="notifications.html">Notifications</a>
      <a href="billing.html" class="active">Billing</a>
    </div>
  </nav>

  <main>
    <h1>Billing</h1>
    <div class="section" id="plan-section">
      <h2>Current plan</h2>
      <div class="info-row">Plan <span id="plan-badge"><span class="badge-free">Free</span></span></div>
      <div class="info-row">Signups included <span id="signup-limit">Up to 100</span></div>
    </div>
    <div class="upgrade-box" id="upgrade-box">
      <h2>Upgrade to Pro</h2>
      <p>Unlimited signups, custom slug, logo, email notifications, and CSV export — $19/month.</p>
      <a href="/pricing.html" class="btn">Upgrade to Pro →</a>
    </div>
  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    await import('/supabase-config.js');
    const supabase = createClient(window.__SUPABASE_URL, window.__SUPABASE_ANON_KEY);
    const params = new URLSearchParams(window.location.search);
    const founderId = params.get('founder_id');
    if (founderId) {
      fetch(`/api/founder?id=${encodeURIComponent(founderId)}`).then(r => r.json()).then(data => {
        const plan = data.founder?.plan || 'free';
        if (plan === 'pro') {
          document.getElementById('plan-badge').innerHTML = '<span class="badge-pro">Pro</span>';
          document.getElementById('signup-limit').textContent = 'Unlimited';
          document.getElementById('upgrade-box').innerHTML = '<h2>Manage subscription</h2><p style="font-size:.875rem;color:var(--muted);margin:.4rem 0 1rem">Update payment details or cancel your plan via the Stripe portal.</p><button class="btn" onclick="alert(\'Stripe portal coming soon\')">Open billing portal</button>';
        }
      }).catch(() => {});
    }
  </script>
<script>
// Append founder_id to all nav links
(function(){
  const id = new URLSearchParams(window.location.search).get("founder_id");
  if (!id) return;
  document.querySelectorAll(".nav-links a").forEach(a=>{
    const u = new URL(a.href, location.href);
    u.searchParams.set("founder_id", id);
    a.href = u.toString();
  });
})(); // nav-founder-fix
</script>
</body>
</html>
