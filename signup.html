<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Founder Signup — Waitlist.so</title>
    <style>body{font-family:system-ui,Arial,Helvetica;margin:2rem;padding:0 1rem;max-width:700px}</style>
  </head>
  <body>
    <h1>Create an account</h1>
    <p>Sign up as a founder to create your waitlist page.</p>

    <form id="signupForm">
      <label>Email<br /><input type="email" id="email" required /></label>
      <label style="display:block;margin-top:.5rem">Password<br /><input type="password" id="password" required /></label>
      <div style="margin-top:1rem">
        <button type="submit">Create account</button>
      </div>
    </form>

    <script type="module">
      import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
      // load config shim
      await import('/supabase-config.js');
      const SUPABASE_URL = window.__SUPABASE_URL;
      const SUPABASE_ANON_KEY = window.__SUPABASE_ANON_KEY;
      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const form = document.getElementById('signupForm');
      form.addEventListener('submit', async (e)=>{
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) return alert('Email and password are required');
        try{
          const { data, error } = await supabase.auth.signUp({ email, password });
          if (error) throw error;
          // Create or fetch founder record via server endpoint
          const cf = await fetch('/api/create-founder', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ email }) });
          if (!cf.ok) throw new Error('Could not create founder');
          const jf = await cf.json();
          const founderId = jf.id;
          // Redirect to dashboard with founder context
          window.location.href = `/dashboard/index.html?founder_id=${encodeURIComponent(founderId)}`;
        }catch(err){
          console.error(err);
          alert(err.message || 'Signup error');
        }
      });
    </script>
  </body>
</html>
