<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Setting up your account — Frontlist</title>
  <link rel="icon" href="/branding/frontlist-logo.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#09090B; --surface:#18181B; --border:#27272A; --text:#FAFAFA; --muted:#A1A1AA; --accent:#6366F1; }
    body {
      font-family: system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 3rem 2.5rem; max-width: 420px; width: 100%; text-align: center; margin: 1rem;
    }
    .logo { margin-bottom: 2rem; }
    h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: .5rem; }
    p { font-size: .9rem; color: var(--muted); line-height: 1.6; margin-top: .75rem; }
    .status-row {
      display: flex; align-items: center; justify-content: center; gap: .6rem;
      margin: 1.75rem 0; font-size: .95rem;
    }
    .spinner {
      width: 18px; height: 18px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .8s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/branding/frontlist-logo.svg" alt="Frontlist" height="34">
    </div>
    <h1>Setting up your account</h1>
    <div class="status-row">
      <div class="spinner" id="spinner"></div>
      <span id="status-text">Confirming your subscription…</span>
    </div>
    <p id="sub-text">This usually takes a few seconds. Don't close this tab.</p>
  </div>

  <script>
    const params    = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');
    const statusEl  = document.getElementById('status-text');
    const subEl     = document.getElementById('sub-text');
    const spinner   = document.getElementById('spinner');

    if (!sessionId) {
      statusEl.textContent = 'No session found.';
      spinner.style.display = 'none';
    } else {
      let attempts = 0;
      const max = 30;

      async function checkStatus() {
        attempts++;
        try {
          const res  = await fetch(`/api/checkout-session-status?session_id=${encodeURIComponent(sessionId)}`);
          if (!res.ok) throw new Error('Status check failed');
          const data = await res.json();
          const plan = data.founder?.plan || null;
          if (plan && plan !== 'pending') {
            spinner.style.display = 'none';
            statusEl.textContent = 'You\'re all set!';
            subEl.textContent    = 'Redirecting to your dashboard…';
            setTimeout(() => {
              const fid = data.founder?.id;
              window.location = fid ? `/dashboard/index.html?founder_id=${fid}` : '/dashboard/index.html';
            }, 1000);
            return;
          }
          if (attempts < max) setTimeout(checkStatus, 2000);
          else {
            spinner.style.display = 'none';
            statusEl.textContent = 'Taking longer than expected.';
            subEl.textContent    = 'Check your email for a receipt — your account will activate shortly.';
          }
        } catch (err) {
          if (attempts < max) setTimeout(checkStatus, 2000);
          else { spinner.style.display = 'none'; statusEl.textContent = 'Error checking status. Try refreshing.'; }
        }
      }

      checkStatus();
    }
  </script>
</body>
</html>
